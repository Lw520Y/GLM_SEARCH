<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM套餐使用汇总</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .summary-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-selector select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .month-selector select:focus {
            border-color: #667eea;
        }

        .total-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .total-stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: white;
        }

        .total-stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .total-stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .key-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .key-table th,
        .key-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .key-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }

        .key-table tr:hover {
            background: #f8f9fa;
        }

        .key-table .key-name {
            font-weight: 500;
            color: #333;
        }

        .key-table .key-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: #666;
        }

        .key-table .usage-value {
            font-weight: 600;
            color: #667eea;
        }

        .key-table .usage-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            min-width: 100px;
        }

        .key-table .usage-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        .export-btn {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .export-btn:hover {
            background: #43A047;
        }

        @media (max-width: 768px) {
            .key-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container-wide">
        <div class="header">
            <h1>📊 GLM套餐使用汇总</h1>
            <p>查看所有Key的月度Token使用量</p>
        </div>

        <div class="nav">
            <a href="index.html">查询页面</a>
            <a href="data.html">Key管理</a>
            <a href="summary.html" class="active">使用汇总</a>
        </div>

        <div class="summary-card">
            <div class="summary-header">
                <h2>月度使用汇总</h2>
                <div class="month-selector">
                    <select id="yearSelect"></select>
                    <select id="monthSelect"></select>
                    <button class="btn btn-primary" onclick="loadSummary()" style="width: auto; padding: 10px 20px;">查询</button>
                    <button class="export-btn" onclick="exportSummary()">📥 导出</button>
                </div>
            </div>

            <div class="total-stats" id="totalStats">
                <div class="total-stat-card">
                    <div class="number" id="totalKeys">0</div>
                    <div class="label">Key数量</div>
                </div>
                <div class="total-stat-card">
                    <div class="number" id="totalUsage">0</div>
                    <div class="label">总使用量</div>
                </div>
                <div class="total-stat-card">
                    <div class="number" id="avgUsage">0</div>
                    <div class="label">平均使用量</div>
                </div>
            </div>

            <table class="key-table" id="keyTable">
                <thead>
                    <tr>
                        <th>Key名称</th>
                        <th>API Key</th>
                        <th>使用量</th>
                        <th>占比</th>
                        <th>使用分布</th>
                    </tr>
                </thead>
                <tbody id="keyTableBody">
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>数据来源：智谱AI财务账单接口 | 仅供参考</p>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>正在查询中...</p>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        // 页面加载
        window.onload = async function() {
            await loadKeys();
            initMonthSelectors();
            loadSummary();
        };

        // 初始化月份选择器
        function initMonthSelectors() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;

            // 生成年份选项（最近3年）
            for (let year = currentYear; year >= currentYear - 2; year--) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year + '年';
                if (year === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }

            // 生成月份选项
            for (let month = 1; month <= 12; month++) {
                const option = document.createElement('option');
                option.value = String(month).padStart(2, '0');
                option.textContent = month + '月';
                if (month === currentMonth) option.selected = true;
                monthSelect.appendChild(option);
            }
        }

        // 加载汇总数据
        async function loadSummary() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            const monthParam = `${year}-${month}`;

            showLoading();

            // 查询所有Key的使用量
            const results = [];
            let totalUsage = 0;

            for (const keyItem of storedKeys) {
                try {
                    const response = await fetch(`${API_BASE}/api/usage?key=${encodeURIComponent(keyItem.key)}&month=${monthParam}`);
                    const data = await response.json();

                    let usage = 0;
                    if (data.code === 200 && data.rows) {
                        const keyPrefix = keyItem.key.split('.')[0];
                        const row = data.rows.find(r => r.apiKey && keyPrefix.startsWith(r.apiKey));
                        usage = row ? (row.deductUsage || 0) : 0;
                    }

                    results.push({
                        name: keyItem.name,
                        key: keyItem.key,
                        usage: usage
                    });

                    totalUsage += usage;
                } catch (error) {
                    results.push({
                        name: keyItem.name,
                        key: keyItem.key,
                        usage: 0,
                        error: error.message
                    });
                }
            }

            // 按使用量排序
            results.sort((a, b) => b.usage - a.usage);

            // 更新统计卡片
            document.getElementById('totalKeys').textContent = storedKeys.length;
            document.getElementById('totalUsage').textContent = formatTokenCount(totalUsage);
            document.getElementById('avgUsage').textContent = storedKeys.length > 0 ? formatTokenCount(Math.round(totalUsage / storedKeys.length)) : '0';

            // 更新表格
            renderTable(results, totalUsage);

            hideLoading();
        }

        // 渲染表格
        function renderTable(results, totalUsage) {
            const tbody = document.getElementById('keyTableBody');
            let html = '';

            results.forEach((item, index) => {
                const maskedKey = maskKey(item.key);
                const percent = totalUsage > 0 ? ((item.usage / totalUsage) * 100).toFixed(1) : 0;

                html += `
                    <tr>
                        <td>
                            <div class="key-name">${item.name}</div>
                        </td>
                        <td>
                            <div class="key-value">${maskedKey}</div>
                        </td>
                        <td>
                            <div class="usage-value">${formatTokenCount(item.usage)}</div>
                        </td>
                        <td>
                            <div>${percent}%</div>
                        </td>
                        <td>
                            <div class="usage-bar">
                                <div class="usage-bar-fill" style="width: ${percent}%"></div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // 导出汇总数据
        function exportSummary() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            const monthParam = `${year}-${month}`;

            const rows = document.getElementById('keyTableBody').querySelectorAll('tr');
            const exportData = [];

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 4) {
                    exportData.push({
                        name: cells[0].textContent.trim(),
                        key: cells[1].textContent.trim(),
                        usage: cells[2].textContent.trim(),
                        percent: cells[3].textContent.trim()
                    });
                }
            });

            const exportObj = {
                month: monthParam,
                exportTime: new Date().toISOString(),
                totalUsage: document.getElementById('totalUsage').textContent,
                data: exportData
            };

            exportData(`glm-summary-${monthParam}.json`, exportObj);
        }

        // 显示加载
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }

        // 隐藏加载
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
